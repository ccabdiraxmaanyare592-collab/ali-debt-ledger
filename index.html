<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali SaaS Debt Network</title>
    <!-- Tailwind CSS for mobile responsive design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Stable UMD versions of React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone compiler to run JSX code dynamically in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> 

    <!-- Firebase SDK Compat libraries for robust cloud data connection -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script> 

    <style>
        @keyframes scaleUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-scale-up {
            animation: scaleUp 0.18s ease-out forwards;
        }
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div> 

    <script type="text/babel">
        const { useState, useEffect } = React; 

        // --- BULLETPROOF INLINE SVG GRAPHICS ---
        const MenuIcon = () => (
          <svg className="w-6 h-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        );
        const CloseIcon = () => (
          <svg className="w-6 h-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        );
        const StoreIcon = () => (
          <svg className="w-6 h-6 text-indigo-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-10.5 0v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m19.28 0H18m-12 0h6m-12 0a1.5 1.5 0 001.5-1.5V6.75A2.25 2.25 0 016 4.5h12a2.25 2.25 0 012.25 2.25V19.5a1.5 1.5 0 001.5 1.5M2.25 12h19.5M12 3v3m0 0l-3-3m3 3l3-3" />
          </svg>
        );
        const SearchIcon = () => (
          <svg className="w-5 h-5 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.604 10.608z" />
          </svg>
        );
        const TrashIcon = () => (
          <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.108 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
        );
        const CheckIcon = () => (
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
        );
        const LogOutIcon = () => (
          <svg className="w-5 h-5 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
          </svg>
        );
        const KeyIcon = () => (
          <svg className="w-4 h-4 mr-1 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
          </svg>
        );
        const ChevronDown = () => (
          <svg className="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        );
        const ChevronUp = () => (
          <svg className="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
          </svg>
        );

        const ALI_ADMIN_PASSWORD = "AliAdmin2026"; 

        // Global Firebase Configuration parameters
        let firebaseConfig = { apiKey: "" };
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            try {
                firebaseConfig = typeof __firebase_config === 'string' 
                    ? JSON.parse(__firebase_config) 
                    : __firebase_config;
            } catch (err) {
                console.error("Failed to parse Firebase configuration:", err);
            }
        } 

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'debt-manager-dashboard'; 

        let firebaseActive = false;
        let db = null;
        let auth = null; 

        if (firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey !== "") {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
                firebaseActive = true;
                console.log("Connected to secure Firebase Cluster!");
            } catch (err) {
                console.error("Database connection failed. Loading local fallback engine.", err);
            }
        } 

        function App() {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [currentView, setCurrentView] = useState('login'); 
          const [notification, setNotification] = useState(null);
          const [isSidebarOpen, setIsSidebarOpen] = useState(false); 

          // --- Ali Super Admin States ---
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const [allTenantShops, setAllTenantShops] = useState([
            { id: 'demo-1', name: 'Demo Test Shop', code: 'demo77', monthlyRent: 25.00, status: 'Active', createdAt: new Date().toISOString() }
          ]);
          // New state for pending access requests
          const [pendingRequests, setPendingRequests] = useState([]);
          const [newShopName, setNewShopName] = useState('');
          const [newShopCode, setNewShopCode] = useState('');
          const [newShopRent, setNewShopRent] = useState('');
          const [adminSearch, setAdminSearch] = useState(''); 

          // --- Shopkeeper States ---
          const [isRequestingAccess, setIsRequestingAccess] = useState(false);
          const [requestShopName, setRequestShopName] = useState('');
          const [shopkeeperNameInput, setShopkeeperNameInput] = useState('');
          const [shopkeeperCodeInput, setShopkeeperCodeInput] = useState('');
          const [activeShopProfile, setActiveShopProfile] = useState(null); 
          const [debts, setDebts] = useState([]); 

          const [searchTerm, setSearchTerm] = useState('');
          const [filterStatus, setFilterStatus] = useState('all');
          const [sortBy, setSortBy] = useState('newest'); 

          // Customer Creator Form Modal
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [customerName, setCustomerName] = useState('');
          const [phoneNumber, setPhoneNumber] = useState('');
          const [initialAmount, setInitialAmount] = useState('');
          const [initialCurrency, setInitialCurrency] = useState('USD');
          const [initialDate, setInitialDate] = useState(new Date().toISOString().split('T')[0]);
          const [initialNote, setInitialNote] = useState(''); 

          // Add Extra Debt Modal
          const [isExtraModalOpen, setIsExtraModalOpen] = useState(false);
          const [selectedCustomerForExtra, setSelectedCustomerForExtra] = useState(null);
          const [extraAmount, setExtraAmount] = useState('');
          const [extraCurrency, setExtraCurrency] = useState('USD');
          const [extraDate, setExtraDate] = useState(new Date().toISOString().split('T')[0]);
          const [extraNote, setExtraNote] = useState(''); 

          // Reduce Debt Modal (Partial payment)
          const [isReduceModalOpen, setIsReduceModalOpen] = useState(false);
          const [selectedCustomerForReduce, setSelectedCustomerForReduce] = useState(null);
          const [selectedTransactionForReduce, setSelectedTransactionForReduce] = useState(null);
          const [reduceAmount, setReduceAmount] = useState('');
          const [reduceDate, setReduceDate] = useState(new Date().toISOString().split('T')[0]); 

          // Expanded cards mapping
          const [expandedCards, setExpandedCards] = useState({}); 

          // Custom Confirmation Modal details
          const [confirmModal, setConfirmModal] = useState({
            isOpen: false,
            title: '',
            message: '',
            onConfirm: null
          }); 

          const toggleExpand = (id) => {
            setExpandedCards(prev => ({ ...prev, [id]: !prev[id] }));
          }; 

          const triggerNotification = (message, type = 'success') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3000);
          }; 

          const triggerConfirm = (title, message, onConfirm) => {
            setConfirmModal({
              isOpen: true,
              title,
              message,
              onConfirm: () => {
                onConfirm();
                setConfirmModal(prev => ({ ...prev, isOpen: false }));
              }
            });
          }; 

          // --- SIGN-IN / SETUP ---
          useEffect(() => {
            let unsubscribe = null;
            
            const runAuth = async () => {
              if (firebaseActive && auth) {
                try {
                  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                  } else {
                    await auth.signInAnonymously();
                  }
                } catch (err) {
                  console.warn("Primary authentication error, attempting anonymous fallback:", err);
                  try {
                    await auth.signInAnonymously();
                  } catch (fallbackErr) {
                    console.error("All authentication strategies failed:", fallbackErr);
                  }
                } 

                unsubscribe = auth.onAuthStateChanged((currentUser) => {
                  setUser(currentUser || { uid: 'offline-user' });
                  setAuthLoading(false);
                });
              } else {
                setUser({ uid: 'offline-user' });
                setAuthLoading(false);
              }
            }; 

            runAuth(); 

            return () => {
              if (unsubscribe) unsubscribe();
            };
          }, []); 

          // --- SYNC ENGINE (Offline LocalStorage + Online Firebase) ---
          useEffect(() => {
            if (!user) return; 

            if (firebaseActive && db) {
              const unsubscribeShops = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tenant_shops')
                .onSnapshot((snapshot) => {
                  const list = [];
                  snapshot.forEach((doc) => {
                    list.push({ id: doc.id, ...doc.data() });
                  });
                  if (list.length > 0) {
                    setAllTenantShops(list);
                    localStorage.setItem('ali_tenant_shops', JSON.stringify(list));
                  } else {
                    setAllTenantShops([
                      { id: 'demo-1', name: 'Demo Test Shop', code: 'demo77', monthlyRent: 25.00, status: 'Active', createdAt: new Date().toISOString() }
                    ]);
                  }
                }, (err) => console.error("Firebase shop load failure:", err));
              
              const unsubscribeRequests = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('pending_requests')
                .onSnapshot((snapshot) => {
                    const reqs = [];
                    snapshot.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                    setPendingRequests(reqs);
                    localStorage.setItem('ali_pending_requests', JSON.stringify(reqs));
                }, (err) => console.error("Firebase requests load failure:", err));

              return () => { unsubscribeShops(); unsubscribeRequests(); };
            } else {
              const backupShops = localStorage.getItem('ali_tenant_shops');
              if (backupShops) setAllTenantShops(JSON.parse(backupShops));

              const backupRequests = localStorage.getItem('ali_pending_requests');
              if (backupRequests) setPendingRequests(JSON.parse(backupRequests));
            }
          }, [user]); 

          useEffect(() => {
            if (!user || !activeShopProfile) return;
            const storageKey = `ali_ledger_${activeShopProfile.code}`; 

            if (firebaseActive && db) {
              const colName = `debts_ledger_${activeShopProfile.code.toLowerCase().trim()}`;
              const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(colName)
                .onSnapshot((snapshot) => {
                  const list = [];
                  snapshot.forEach((doc) => {
                    list.push({ id: doc.id, ...doc.data() });
                  });
                  setDebts(list);
                  localStorage.setItem(storageKey, JSON.stringify(list));
                }, (err) => {
                  console.error("Firebase ledger load failure, loading local cache:", err);
                  const cache = localStorage.getItem(storageKey);
                  if (cache) setDebts(JSON.parse(cache));
                });
              return () => unsubscribe();
            } else {
              const cache = localStorage.getItem(storageKey);
              setDebts(cache ? JSON.parse(cache) : []);
            }
          }, [user, activeShopProfile]); 

          // Sync Helper Functions
          const saveShops = async (list) => {
            setAllTenantShops(list);
            localStorage.setItem('ali_tenant_shops', JSON.stringify(list));
          }; 

          const saveDebts = async (list) => {
            setDebts(list);
            if (activeShopProfile) {
              localStorage.setItem(`ali_ledger_${activeShopProfile.code}`, JSON.stringify(list));
            }
          }; 

          // --- ROUTING HANDLERS ---
          const handleAdminLogin = (e) => {
            e.preventDefault();
            if (adminPasswordInput === ALI_ADMIN_PASSWORD) {
              setCurrentView('admin');
              triggerNotification("SaaS Admin Panel successfully loaded.");
              setAdminPasswordInput('');
            } else {
              triggerNotification("Access Denied.", "error");
            }
          }; 

          // NEW: Send Request for Access
          const handleSendRequest = async (e) => {
            e.preventDefault();
            if (!requestShopName.trim()) return;
            
            const newReq = {
                id: Math.random().toString(36).substring(2, 11),
                name: requestShopName.trim(),
                createdAt: new Date().toISOString()
            };

            const updatedReqs = [...pendingRequests, newReq];
            setPendingRequests(updatedReqs);
            localStorage.setItem('ali_pending_requests', JSON.stringify(updatedReqs));

            if (firebaseActive && db) {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('pending_requests').doc(newReq.id).set(newReq);
                } catch(err) { console.error(err); }
            }

            triggerNotification("Request sent! Waiting for Admin to generate your code.");
            setRequestShopName('');
            setIsRequestingAccess(false); // Go back to login screen
          };

          // UPDATED: Require BOTH Shop Name and Access Code
          const handleShopkeeperLogin = (e) => {
            e.preventDefault();
            const cleanCode = shopkeeperCodeInput.trim().toLowerCase();
            const cleanName = shopkeeperNameInput.trim().toLowerCase();

            // Find matching name AND code
            const found = allTenantShops.find(s => 
                s.code.toLowerCase() === cleanCode && 
                s.name.toLowerCase() === cleanName
            ); 

            if (!found) {
              triggerNotification("Incorrect Shop Name or Access Code.", "error");
              return;
            }
            if (found.status === 'Suspended') {
              triggerNotification("This shopkeeper's terminal is currently suspended.", "error");
              return;
            } 

            setActiveShopProfile(found);
            setCurrentView('shopkeeper');
            setIsSidebarOpen(false);
            triggerNotification(`Welcome to ${found.name}`);
          }; 

          // --- MASTER SYSTEM OPERATIONS ---
          const handleApproveRequest = (req) => {
            setNewShopName(req.name);
            // Auto-generate a random 6-character code as suggestion
            setNewShopCode(Math.random().toString(36).substring(2, 8).toUpperCase());
            triggerNotification(`Preparing to register ${req.name}. Please enter rent and confirm.`);
            
            // Delete from pending requests visually to clean up list
            handleDeleteRequest(req.id, false);
          };

          const handleDeleteRequest = async (reqId, showNotification = true) => {
            const updatedReqs = pendingRequests.filter(r => r.id !== reqId);
            setPendingRequests(updatedReqs);
            localStorage.setItem('ali_pending_requests', JSON.stringify(updatedReqs));

            if (firebaseActive && db) {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('pending_requests').doc(reqId).delete();
                } catch(err) { console.error(err); }
            }
            if (showNotification) triggerNotification("Request deleted.");
          };

          const handleRegisterShop = async (e) => {
            e.preventDefault();
            if (!newShopName.trim() || !newShopCode.trim()) return;
            const cleanCode = newShopCode.trim().toLowerCase(); 

            if (allTenantShops.some(s => s.code.toLowerCase() === cleanCode)) {
              triggerNotification("This store access code is already registered.", "error");
              return;
            } 

            const newId = Math.random().toString(36).substring(2, 11);
            const newShop = {
              id: newId,
              name: newShopName.trim(),
              code: cleanCode,
              monthlyRent: parseFloat(newShopRent) || 0,
              status: 'Active',
              createdAt: new Date().toISOString()
            }; 

            const updated = [...allTenantShops, newShop];
            saveShops(updated); 

            if (firebaseActive && db) {
              try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tenant_shops').doc(newId).set(newShop);
              } catch (err) { console.error(err); }
            } 

            triggerNotification(`Registered store passcode: ${cleanCode}`);
            setNewShopName(''); setNewShopCode(''); setNewShopRent('');
          }; 

          const toggleShopStatus = async (shop) => {
            const nextStatus = shop.status === 'Active' ? 'Suspended' : 'Active';
            const updated = allTenantShops.map(s => s.id === shop.id ? { ...s, status: nextStatus } : s);
            saveShops(updated); 

            if (firebaseActive && db) {
              try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tenant_shops').doc(shop.id).update({ status: nextStatus });
              } catch (err) { console.error(err); }
            }
            triggerNotification(`Shop status set to: ${nextStatus}`);
          }; 

          const handleDeleteShop = (shop) => {
            triggerConfirm(
              "Delete Store License",
              `Are you sure you want to completely delete ${shop.name}? This removes all client files associated with their workspace code.`,
              async () => {
                const updated = allTenantShops.filter(s => s.id !== shop.id);
                saveShops(updated); 

                if (firebaseActive && db) {
                  try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tenant_shops').doc(shop.id).delete();
                  } catch (err) { console.error(err); }
                }
                triggerNotification("Erase operation complete.");
              }
            );
          }; 

          // --- LEDGER WRITE CONTROLLERS ---
          const handleCreateCustomerAndDebt = async (e) => {
            e.preventDefault();
            if (!customerName.trim() || !initialAmount || !activeShopProfile) return; 

            const val = parseFloat(initialAmount);
            const newId = Math.random().toString(36).substring(2, 11);
            const newClient = {
              id: newId,
              customerName: customerName.trim(),
              phoneNumber: phoneNumber.trim() || 'N/A',
              createdAt: new Date().toISOString(),
              transactions: [{
                id: Math.random().toString(36).substring(2, 11),
                amount: val,
                currency: initialCurrency,
                date: initialDate,
                note: initialNote.trim() || 'Initial Balance Entry',
                status: 'Unpaid'
              }]
            }; 

            const updated = [newClient, ...debts];
            saveDebts(updated); 

            if (firebaseActive && db) {
              try {
                const colName = `debts_ledger_${activeShopProfile.code.toLowerCase().trim()}`;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(colName).doc(newId).set(newClient);
              } catch (err) { console.error(err); }
            } 

            triggerNotification(`Added ledger for ${customerName}`);
            setCustomerName(''); setPhoneNumber(''); setInitialAmount(''); setInitialNote('');
            setIsModalOpen(false);
          }; 

          const handleAddExtraDebt = async (e) => {
            e.preventDefault();
            if (!selectedCustomerForExtra || !extraAmount || !activeShopProfile) return; 

            const val = parseFloat(extraAmount);
            const newLog = {
              id: Math.random().toString(36).substring(2, 11),
              amount: val,
              currency: extraCurrency,
              date: extraDate,
              note: extraNote.trim() || 'Additional Purchase Log',
              status: 'Unpaid'
            }; 

            const updated = debts.map(c => {
              if (c.id === selectedCustomerForExtra.id) {
                return { ...c, transactions: [...(c.transactions || []), newLog] };
              }
              return c;
            });
            saveDebts(updated); 

            if (firebaseActive && db) {
              try {
                const colName = `debts_ledger_${activeShopProfile.code.toLowerCase().trim()}`;
                const match = updated.find(c => c.id === selectedCustomerForExtra.id);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(colName).doc(selectedCustomerForExtra.id).update({ transactions: match.transactions });
              } catch (err) { console.error(err); }
            } 

            triggerNotification("Additional ledger log appended.");
            setExtraAmount(''); setExtraNote('');
            setIsExtraModalOpen(false);
            setSelectedCustomerForExtra(null);
          }; 

          const handleReduceDebt = async (e) => {
            e.preventDefault();
            if (!selectedCustomerForReduce || !selectedTransactionForReduce || !reduceAmount || !activeShopProfile) return; 

            const val = parseFloat(reduceAmount);
            if (isNaN(val) || val <= 0) return; 

            const updated = debts.map(c => {
              if (c.id === selectedCustomerForReduce.id) {
                const updatedTx = c.transactions.map(t => {
                  if (t.id === selectedTransactionForReduce.id) {
                    const rem = t.amount - val;
                    return {
                      ...t,
                      amount: rem,
                      note: `${t.note || ''} (Paid $${val} on ${reduceDate})`.trim(),
                      status: rem <= 0 ? 'Paid' : 'Unpaid'
                    };
                  }
                  return t;
                });
                return { ...c, transactions: updatedTx };
              }
              return c;
            });
            saveDebts(updated); 

            if (firebaseActive && db) {
              try {
                const colName = `debts_ledger_${activeShopProfile.code.toLowerCase().trim()}`;
                const match = updated.find(c => c.id === selectedCustomerForReduce.id);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(colName).doc(selectedCustomerForReduce.id).update({ transactions: match.transactions });
              } catch (err) { console.error(err); }
            } 

            triggerNotification("Payment balance logged.");
            setReduceAmount('');
            setIsReduceModalOpen(false);
            setSelectedCustomerForReduce(null);
            setSelectedTransactionForReduce(null);
          }; 

          const setTransactionStatus = async (customer, tId, stat) => {
            const updated = debts.map(c => {
              if (c.id === customer.id) {
                const nextTx = c.transactions.map(t => t.id === tId ? { ...t, status: stat } : t);
                return { ...c, transactions: nextTx };
              }
              return c;
            });
            saveDebts(updated); 

            if (firebaseActive && db) {
              try {
                const colName = `debts_ledger_${activeShopProfile.code.toLowerCase().trim()}`;
                const match = updated.find(c => c.id === customer.id);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(colName).doc(customer.id).update({ transactions: match.transactions });
              } catch (err) { console.error(err); }
            }
            triggerNotification(`Log marked as ${stat}`);
          }; 

          const handleDeleteTransaction = (customer, tId) => {
            triggerConfirm(
              "Delete Ledger Entry",
              "Are you sure you want to permanently delete this logged transaction record?",
              async () => {
                const updated = debts.map(c => {
                  if (c.id === customer.id) {
                    const filtered = c.transactions.filter(t => t.id !== tId);
                    return { ...c, transactions: filtered };
                  }
                  return c;
                });
                saveDebts(updated); 

                if (firebaseActive && db) {
                  try {
                    const colName = `debts_ledger_${activeShopProfile.code.toLowerCase().trim()}`;
                    const match = updated.find(c => c.id === customer.id);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(colName).doc(customer.id).update({ transactions: match.transactions });
                  } catch (err) { console.error(err); }
                }
                triggerNotification("Erase log completed.");
              }
            );
          }; 

          const handleDeleteCustomerEntirely = (cId, name) => {
            triggerConfirm(
              "Erase Customer Account Profile",
              `Are you sure you want to erase ${name} and all associated ledger records from memory?`,
              async () => {
                const updated = debts.filter(c => c.id !== cId);
                saveDebts(updated); 

                if (firebaseActive && db) {
                  try {
                    const colName = `debts_ledger_${activeShopProfile.code.toLowerCase().trim()}`;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(colName).doc(cId).delete();
                  } catch (err) { console.error(err); }
                }
                triggerNotification("Client directory wiped.");

            setActiveShopProfile(null);
            setShopkeeperNameInput('');
            setShopkeeperCodeInput('');
            setIsSidebarOpen(false);

          // --- STATS ENGINES ---
          const getBalances = (tx = []) => {
            let owesUSD = 0, weOweUSD = 0, owesSSH = 0, weOweSSH = 0, paidUSD = 0, paidSSH = 0;
            tx.forEach(t => {
              const amt = parseFloat(t.amount) || 0;
              const cur = t.currency || 'USD';
              const stat = t.status || 'Unpaid'; 

              if (stat === 'Paid') {
                if (cur === 'USD') paidUSD += Math.max(0, amt);
                else paidSSH += Math.max(0, amt);
              } else {
                if (cur === 'USD') {
                  if (amt > 0) owesUSD += amt;
                  else weOweUSD += Math.abs(amt);
                } else {
                  if (amt > 0) owesSSH += amt;
                  else weOweSSH += Math.abs(amt);
                }
              }
            });
            return { owesUSD, weOweUSD, owesSSH, weOweSSH, paidUSD, paidSSH };
          }; 

          const getGlobalTotals = () => {
            let owesUSD = 0, weOweUSD = 0, owesSSH = 0, weOweSSH = 0, paidUSD = 0, paidSSH = 0;
            debts.forEach(c => {
              const b = getBalances(c.transactions || []);
              owesUSD += b.owesUSD; weOweUSD += b.weOweUSD;
              owesSSH += b.owesSSH; weOweSSH += b.weOweSSH;
              paidUSD += b.paidUSD; paidSSH += b.paidSSH;
            });
            return { owesUSD, weOweUSD, owesSSH, weOweSSH, paidUSD, paidSSH };
          }; 

          const processedDebts = debts
            .filter(c => {
              const nameMatch = c.customerName ? c.customerName.toLowerCase().includes(searchTerm.toLowerCase()) : false;

              const match = nameMatch || phoneMatch; 

              if (filterStatus === 'all') return match;
              const b = getBalances(c.transactions || []);
              if (filterStatus === 'unpaid') return match && (b.owesUSD > 0 || b.owesSSH > 0);
              return match && (b.owesUSD === 0 && b.owesSSH === 0);
            })
            .sort((a, b) => {
              if (sortBy === 'newest') return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
              return getBalances(b.transactions || []).owesUSD - getBalances(a.transactions || []).owesUSD;
            });

                      <div className="divide-y divide-slate-100 text-xs">

          if (currentView === 'shopkeeper') {

                  <div className="flex items-center gap-3">

                <main className="p-4 max-w-3xl w-full mx-auto space-y-6">
                  
                  {/* Dashboard Stats */}

                        <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Total Outstanding Debt</span>

                                                            </div>
                                                            <p className="text-xs text-slate-600 font-medium">{tx.note}</p>
                                                            <p className="text-[10px] text-slate-400 mt-1">{tx.date}</p>
                                                        </div>
                                                        <div className="flex flex-col gap-1.5 shrink-0">
                                                            {tx.status !== 'Paid' && (
                                                                <button onClick={() => { setSelectedCustomerForReduce(customer); setSelectedTransactionForReduce(tx); setIsReduceModalOpen(true); }} className="px-2 py-1.5 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded text-[10px] font-bold transition">
                                                                    Log Payment
                                                                </button>
                                                            )}
                                                            {tx.status !== 'Paid' && (
                                                                <button onClick={() => setTransactionStatus(customer, tx.id, 'Paid')} className="px-2 py-1 flex justify-center text-slate-400 hover:text-emerald-600 transition">
                                                                    <CheckIcon />
                                                                </button>
                                                            )}
                                                            <button onClick={() => handleDeleteTransaction(customer, tx.id)} className="px-2 py-1 flex justify-center text-slate-300 hover:text-rose-600 transition">
                                                                <TrashIcon />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })
                    )}
                  </div>
                </main>

                {/* --- CREATE CUSTOMER MODAL --- */}
                {isModalOpen && (
                  <div className="fixed inset-0 modal-overlay z-50 flex items-end sm:items-center justify-center">
                    <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl p-5 shadow-2xl animate-scale-up">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-slate-900">New Customer Ledger</h3>
                            <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600"><CloseIcon /></button>
                        </div>
                        <form onSubmit={handleCreateCustomerAndDebt} className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-slate-600 block mb-1">Customer Name</label>
                                <input type="text" required value={customerName} onChange={e=>setCustomerName(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="e.g. Ahmed Ali" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-600 block mb-1">Phone Number (Optional)</label>
                                <input type="tel" value={phoneNumber} onChange={e=>setPhoneNumber(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="e.g. 063..." />
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-xs font-bold text-slate-600 block mb-1">Initial Debt ($)</label>
                                    <input type="number" step="0.01" required value={initialAmount} onChange={e=>setInitialAmount(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 font-bold" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-600 block mb-1">Date</label>
                                    <input type="date" required value={initialDate} onChange={e=>setInitialDate(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 text-slate-600" />
                                </div>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-600 block mb-1">Note (Optional)</label>
                                <input type="text" value={initialNote} onChange={e=>setInitialNote(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="e.g. Groceries" />
                            </div>
                            <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-md transition-colors mt-2">
                                Save Customer & Debt
                            </button>
                        </form>
                    </div>
                  </div>
                )}

                {/* --- ADD EXTRA DEBT MODAL --- */}
                {isExtraModalOpen && (
                  <div className="fixed inset-0 modal-overlay z-50 flex items-end sm:items-center justify-center">
                    <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl p-5 shadow-2xl animate-scale-up">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-slate-900">Add Debt for {selectedCustomerForExtra?.customerName}</h3>
                            <button onClick={() => setIsExtraModalOpen(false)} className="text-slate-400 hover:text-slate-600"><CloseIcon /></button>
                        </div>
                        <form onSubmit={handleAddExtraDebt} className="space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-xs font-bold text-slate-600 block mb-1">Amount ($)</label>
                                    <input type="number" step="0.01" required value={extraAmount} onChange={e=>setExtraAmount(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 font-bold" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-600 block mb-1">Date</label>
                                    <input type="date" required value={extraDate} onChange={e=>setExtraDate(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 text-slate-600" />
                                </div>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-600 block mb-1">Items / Note</label>
                                <input type="text" required value={extraNote} onChange={e=>setExtraNote(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="e.g. Rice and Sugar" />
                            </div>
                            <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-md transition-colors mt-2">
                                Log Additional Debt
                            </button>
                        </form>
                    </div>
                  </div>
                )}

                {/* --- REDUCE DEBT (PAYMENT) MODAL --- */}
                {isReduceModalOpen && (
                  <div className="fixed inset-0 modal-overlay z-50 flex items-end sm:items-center justify-center">
                    <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl p-5 shadow-2xl animate-scale-up">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-emerald-700">Log Partial Payment</h3>
                            <button onClick={() => setIsReduceModalOpen(false)} className="text-slate-400 hover:text-slate-600"><CloseIcon /></button>
                        </div>
                        <p className="text-xs text-slate-500 mb-4">Logging payment for transaction of <strong className="text-slate-900">${selectedTransactionForReduce?.amount}</strong>.</p>
                        <form onSubmit={handleReduceDebt} className="space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-xs font-bold text-slate-600 block mb-1">Amount Paid ($)</label>
                                    <input type="number" step="0.01" required value={reduceAmount} onChange={e=>setReduceAmount(e.target.value)} max={selectedTransactionForReduce?.amount} className="w-full px-3 py-2 bg-slate-50 border border-emerald-200 rounded-lg text-sm focus:outline-none focus:border-emerald-500 font-bold text-emerald-700" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-600 block mb-1">Date Paid</label>
                                    <input type="date" required value={reduceDate} onChange={e=>setReduceDate(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 text-slate-600" />
                                </div>
                            </div>
                            <button type="submit" className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl shadow-md transition-colors mt-2">
                                Confirm Payment
                            </button>
                        </form>
                    </div>
                  </div>
                )}

              </div>
            );
          }

          return null;
        } 

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
