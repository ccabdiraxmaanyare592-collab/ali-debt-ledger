<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali SaaS Debt Network</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- BULLETPROOF INLINE SVG ICONS ---
        const MenuIcon = () => (
          <svg className="w-5 h-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        );
        const CloseIcon = () => (
          <svg className="w-5 h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        );
        const StoreIcon = () => (
          <svg className="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-10.5 0v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m19.28 0H18m-12 0h6m-12 0a1.5 1.5 0 001.5-1.5V6.75A2.25 2.25 0 016 4.5h12a2.25 2.25 0 012.25 2.25V19.5a1.5 1.5 0 001.5 1.5M2.25 12h19.5M12 3v3m0 0l-3-3m3 3l3-3" />
          </svg>
        );
        const SearchIcon = () => (
          <svg className="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.604 10.608z" />
          </svg>
        );
        const TrashIcon = () => (
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.108 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
        );
        const MinusIcon = () => (
          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3">
            <path strokeLinecap="round" strokeLinejoin="round" d="M18 12H6" />
          </svg>
        );
        const CheckIcon = () => (
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
        );
        const AlertIcon = () => (
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.879 0L3.001 18.118zM12 15.75h.007v.008H12v-.008z" />
          </svg>
        );
        const LogOutIcon = () => (
          <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
          </svg>
        );
        const StarIcon = () => (
          <svg className="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21l8.954-4.642L21 21l-.813-5.096L24 11.455l-5.088-.739L17 6l-1.912 4.716L10 11.455l3.813 4.449z" />
          </svg>
        );

        const ALI_ADMIN_PASSWORD = "AliAdmin2026"; 

        function App() {
          const [currentView, setCurrentView] = useState('login'); 
          const [notification, setNotification] = useState(null);
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);

          // --- Ali Super Admin States ---
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const [allTenantShops, setAllTenantShops] = useState(() => {
            const saved = localStorage.getItem('ali_saas_tenant_shops');
            return saved ? JSON.parse(saved) : [
              { id: 'demo-1', name: 'Demo Test Shop', code: 'demo77', monthlyRent: 25.00, status: 'Active', createdAt: new Date().toISOString() }
            ];
          });
          const [newShopName, setNewShopName] = useState('');
          const [newShopCode, setNewShopCode] = useState('');
          const [newShopRent, setNewShopRent] = useState('');
          const [adminSearch, setAdminSearch] = useState('');

          // --- Shopkeeper States ---
          const [shopkeeperCodeInput, setShopkeeperCodeInput] = useState('');
          const [activeShopProfile, setActiveShopProfile] = useState(null); 
          const [debts, setDebts] = useState([]);

          const [searchTerm, setSearchTerm] = useState('');
          const [filterStatus, setFilterStatus] = useState('all');
          const [sortBy, setSortBy] = useState('newest');

          // Customer Creator Form Modal
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [customerName, setCustomerName] = useState('');
          const [phoneNumber, setPhoneNumber] = useState('');
          const [initialAmount, setInitialAmount] = useState('');
          const [initialCurrency, setInitialCurrency] = useState('USD');
          const [initialDate, setInitialDate] = useState(new Date().toISOString().split('T')[0]);
          const [initialNote, setInitialNote] = useState('');

          // Add Extra Debt Modal
          const [isExtraModalOpen, setIsExtraModalOpen] = useState(false);
          const [selectedCustomerForExtra, setSelectedCustomerForExtra] = useState(null);
          const [extraAmount, setExtraAmount] = useState('');
          const [extraCurrency, setExtraCurrency] = useState('USD');
          const [extraDate, setExtraDate] = useState(new Date().toISOString().split('T')[0]);
          const [extraNote, setExtraNote] = useState('');

          // Reduce Debt Modal (Partial payment)
          const [isReduceModalOpen, setIsReduceModalOpen] = useState(false);
          const [selectedCustomerForReduce, setSelectedCustomerForReduce] = useState(null);
          const [selectedTransactionForReduce, setSelectedTransactionForReduce] = useState(null);
          const [reduceAmount, setReduceAmount] = useState('');
          const [reduceDate, setReduceDate] = useState(new Date().toISOString().split('T')[0]);

          // Dropdown card tracker
          const [expandedCards, setExpandedCards] = useState({});

          // Custom Confirmation Modal State
          const [confirmModal, setConfirmModal] = useState({
            isOpen: false,
            title: '',
            message: '',
            onConfirm: null
          });

          // Save shops to localStorage
          useEffect(() => {
            localStorage.setItem('ali_saas_tenant_shops', JSON.stringify(allTenantShops));
          }, [allTenantShops]);

          // Load active store debts from localStorage when store switches
          useEffect(() => {
            if (activeShopProfile) {
              const savedDebts = localStorage.getItem(`debts_ledger_${activeShopProfile.code}`);
              if (savedDebts) {
                setDebts(JSON.parse(savedDebts));
              } else if (activeShopProfile.code === 'demo77') {
                // Load default demo values for testing if database is empty
                const defaultDemo = [
                  { 
                    id: 'd1', 
                    customerName: 'Ahmed Mohamed', 
                    phoneNumber: '063-4441111', 
                    createdAt: '2026-07-01T10:00:00Z',
                    transactions: [
                      { id: 't1_1', amount: 20.00, currency: 'USD', date: '2026-07-01', note: 'Flour and oil', status: 'Unpaid' },
                      { id: 't1_2', amount: 23.00, currency: 'USD', date: '2026-07-05', note: 'Other grocery items', status: 'Unpaid' },
                      { id: 't1_3', amount: 15000, currency: 'SSH', date: '2026-07-05', note: 'Clean drinking water', status: 'Unpaid' }
                    ]
                  }
                ];
                setDebts(defaultDemo);
                localStorage.setItem('debts_ledger_demo77', JSON.stringify(defaultDemo));
              } else {
                setDebts([]);
              }
            }
          }, [activeShopProfile]);

          // Save current store's debts to localStorage when they change
          useEffect(() => {
            if (activeShopProfile) {
              localStorage.setItem(`debts_ledger_${activeShopProfile.code}`, JSON.stringify(debts));
            }
          }, [debts, activeShopProfile]);

          const toggleExpand = (id) => {
            setExpandedCards(prev => ({ ...prev, [id]: !prev[id] }));
          };

          const triggerNotification = (message, type = 'success') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 4000);
          };

          const triggerConfirm = (title, message, onConfirm) => {
            setConfirmModal({
              isOpen: true,
              title,
              message,
              onConfirm: () => {
                onConfirm();
                setConfirmModal(prev => ({ ...prev, isOpen: false }));
              }
            });
          };

          // --- ACCESS ROUTING ---
          const handleAdminLogin = (e) => {
            e.preventDefault();
            if (adminPasswordInput === ALI_ADMIN_PASSWORD) {
              setCurrentView('admin');
              triggerNotification("Master Admin panel unlocked successfully.");
              setAdminPasswordInput('');
            } else {
              triggerNotification("Invalid admin credentials. Access Denied.", "error");
            }
          };

          const handleShopkeeperLogin = (e) => {
            e.preventDefault();
            const cleanCode = shopkeeperCodeInput.trim().toLowerCase();
            const foundShop = allTenantShops.find(s => s.code.toLowerCase() === cleanCode);
            
            if (!foundShop) {
              triggerNotification("Shop access code not found! Try 'demo77' to test.", "error");
              return;
            }
            if (foundShop.status === 'Suspended') {
              triggerNotification("This store account has been suspended.", "error");
              return;
            }

            setActiveShopProfile(foundShop);
            setCurrentView('shopkeeper');
            setIsSidebarOpen(false);
            triggerNotification(`Connected to workspace: ${foundShop.name}`);
          };

          // --- SUPER ADMIN WRITE OPERATIONS ---
          const handleRegisterShop = (e) => {
            e.preventDefault();
            if (!newShopName.trim() || !newShopCode.trim()) return;
            const clean = newShopCode.trim().toLowerCase();

            if (allTenantShops.some(s => s.code.toLowerCase() === clean)) {
              triggerNotification("A store with this code already exists.", "error");
              return;
            }

            const newS = {
              id: Math.random().toString(),
              name: newShopName.trim(),
              code: clean,
              monthlyRent: parseFloat(newShopRent) || 0,
              status: 'Active',
              createdAt: new Date().toISOString()
            };

            setAllTenantShops([...allTenantShops, newS]);
            triggerNotification(`Activated licensed store code: ${clean}`);
            setNewShopName(''); 
            setNewShopCode(''); 
            setNewShopRent('');
          };

          const toggleShopStatus = (shop) => {
            const nextStatus = shop.status === 'Active' ? 'Suspended' : 'Active';
            setAllTenantShops(allTenantShops.map(s => s.id === shop.id ? { ...s, status: nextStatus } : s));
            triggerNotification(`Store license status updated to ${nextStatus}`);
          };

          const handleDeleteShop = (shop) => {
            triggerConfirm(
              "Confirm Store Deletion",
              `Are you sure you want to permanently delete "${shop.name}"? This cannot be undone.`,
              () => {
                setAllTenantShops(allTenantShops.filter(s => s.id !== shop.id));
                triggerNotification("Removed store license successfully.");
              }
            );
          };

          // --- SHOPKEEPER WRITE OPERATIONS ---
          const handleCreateCustomerAndDebt = (e) => {
            e.preventDefault();
            if (!customerName.trim() || !initialAmount) return;

            const val = parseFloat(initialAmount);
            const newCustomerProfile = {
              id: Math.random().toString(),
              customerName: customerName.trim(),
              phoneNumber: phoneNumber.trim() || 'N/A',
              createdAt: new Date().toISOString(),
              transactions: [{
                id: Math.random().toString(),
                amount: val,
                currency: initialCurrency,
                date: initialDate,
                note: initialNote.trim() || 'Initial Ledger Entry',
                status: 'Unpaid'
              }]
            };

            setDebts([newCustomerProfile, ...debts]);
            triggerNotification(`Created ledger profile for ${customerName}`);
            setCustomerName(''); 
            setPhoneNumber(''); 
            setInitialAmount(''); 
            setInitialNote('');
            setIsModalOpen(false);
          };

          const handleAddExtraDebt = (e) => {
            e.preventDefault();
            if (!selectedCustomerForExtra || !extraAmount) return;

            const val = parseFloat(extraAmount);
            const newT = {
              id: Math.random().toString(),
              amount: val,
              currency: extraCurrency,
              date: extraDate,
              note: extraNote.trim() || 'Extra Ledger Tab',
              status: 'Unpaid'
            };

            setDebts(debts.map(c => {
              if (c.id === selectedCustomerForExtra.id) {
                return { ...c, transactions: [...(c.transactions || []), newT] };
              }
              return c;
            }));

            triggerNotification("Appended extra ledger entry successfully.");
            setExtraAmount(''); 
            setExtraNote('');
            setIsExtraModalOpen(false);
            setSelectedCustomerForExtra(null);
          };

          const handleReduceDebt = (e) => {
            e.preventDefault();
            if (!selectedCustomerForReduce || !selectedTransactionForReduce || !reduceAmount) return;

            const val = parseFloat(reduceAmount);
            if (isNaN(val) || val <= 0) return;

            const updatedTx = selectedCustomerForReduce.transactions.map(t => {
              if (t.id === selectedTransactionForReduce.id) {
                const rem = t.amount - val;
                return {
                  ...t,
                  amount: rem,
                  note: `${t.note || ''} (Paid $${val} on ${reduceDate})`.trim(),
                  status: rem <= 0 ? 'Paid' : 'Unpaid'
                };
              }
              return t;
            });

            setDebts(debts.map(c => c.id === selectedCustomerForReduce.id ? { ...c, transactions: updatedTx } : c));
            triggerNotification("Customer ledger balance reduced!");
            setReduceAmount('');
            setIsReduceModalOpen(false);
            setSelectedCustomerForReduce(null);
            setSelectedTransactionForReduce(null);
          };

          const setTransactionStatus = (cId, tId, stat) => {
            setDebts(prev => prev.map(c => {
              if (c.id === cId) {
                const nextTx = c.transactions.map(t => t.id === tId ? { ...t, status: stat } : t);
                return { ...c, transactions: nextTx };
              }
              return c;
            }));
            triggerNotification(`Log status changed to: ${stat}`);
          };

          const handleDeleteTransaction = (cId, tId) => {
            triggerConfirm(
              "Delete Ledger Log Entry",
              "Are you sure you want to permanently delete this specific ledger transaction log?",
              () => {
                setDebts(prev => prev.map(c => {
                  if (c.id === cId) {
                    const nextTx = c.transactions.filter(t => t.id !== tId);
                    return { ...c, transactions: nextTx };
                  }
                  return c;
                }));
                triggerNotification("Deleted ledger log successfully.");
              }
            );
          };

          const handleDeleteCustomerEntirely = (cId, name) => {
            triggerConfirm(
              "Remove Customer Account",
              `Are you sure you want to permanently remove "${name}" and all historical ledger entries?`,
              () => {
                setDebts(debts.filter(c => c.id !== cId));
                triggerNotification(`Removed ledger records for ${name}`);
              }
            );
          };

          const handleLogout = () => {
            setActiveShopProfile(null);
            setShopkeeperCodeInput('');
            setIsSidebarOpen(false);
            setCurrentView('login');
          };

          // --- LEDGER STATS ENGINE ---
          const getBalances = (tx = []) => {
            let owesUSD = 0, weOweUSD = 0, owesSSH = 0, weOweSSH = 0, paidUSD = 0, paidSSH = 0;
            tx.forEach(t => {
              const amt = parseFloat(t.amount) || 0;
              const cur = t.currency || 'USD';
              const stat = t.status || 'Unpaid';

              if (stat === 'Paid') {
                if (cur === 'USD') paidUSD += Math.max(0, amt);
                else paidSSH += Math.max(0, amt);
              } else {
                if (cur === 'USD') {
                  if (amt > 0) owesUSD += amt;
                  else weOweUSD += Math.abs(amt);
                } else {
                  if (amt > 0) owesSSH += amt;
                  else weOweSSH += Math.abs(amt);
                }
              }
            });
            return { owesUSD, weOweUSD, owesSSH, weOweSSH, paidUSD, paidSSH };
          };

          const getGlobalTotals = () => {
            let owesUSD = 0, weOweUSD = 0, owesSSH = 0, weOweSSH = 0, paidUSD = 0, paidSSH = 0;
            debts.forEach(c => {
              const b = getBalances(c.transactions || []);
              owesUSD += b.owesUSD; weOweUSD += b.weOweUSD;
              owesSSH += b.owesSSH; weOweSSH += b.weOweSSH;
              paidUSD += b.paidUSD; paidSSH += b.paidSSH;
            });
            return { owesUSD, weOweUSD, owesSSH, weOweSSH, paidUSD, paidSSH };
          };

          // --- FILTER & SORT CUSTOMER DATA ---
          const processedDebts = debts
            .filter(c => {
              const nameMatch = c.customerName ? c.customerName.toLowerCase().includes(searchTerm.toLowerCase()) : false;
              const phoneMatch = c.phoneNumber ? c.phoneNumber.includes(searchTerm) : false;
              const match = nameMatch || phoneMatch;

              if (filterStatus === 'all') return match;
              const b = getBalances(c.transactions || []);
              if (filterStatus === 'unpaid') return match && (b.owesUSD > 0 || b.owesSSH > 0);
              return match && (b.owesUSD === 0 && b.owesSSH === 0);
            })
            .sort((a, b) => {
              if (sortBy === 'newest') return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
              return getBalances(b.transactions || []).owesUSD - getBalances(a.transactions || []).owesUSD;
            });

          const filteredShops = allTenantShops.filter(s => {
            const nameMatch = s.name ? s.name.toLowerCase().includes(adminSearch.toLowerCase()) : false;
            const codeMatch = s.code ? s.code.toLowerCase().includes(adminSearch.toLowerCase()) : false;
            return nameMatch || codeMatch;
          });
          
          const globalStore = getGlobalTotals();

          // VIEWPORT: PORTAL ACCESS GATEWAY
          if (currentView === 'login') {
            return (
              <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4">
                {notification && (
                  <div className="fixed top-4 right-4 bg-slate-900 text-white border border-slate-800 text-xs px-3.5 py-2 rounded-xl z-50 animate-bounce shadow-xl">
                    {notification.message}
                  </div>
                )}

                <div className="w-full max-w-sm bg-slate-900 border border-slate-800/80 rounded-3xl p-6 space-y-6 shadow-2xl relative overflow-hidden">
                  <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500"></div>
                  
                  <div className="text-center space-y-2">
                    <div className="w-14 h-14 rounded-2xl bg-indigo-500/10 flex items-center justify-center mx-auto text-indigo-400 border border-indigo-500/20">
                      <StoreIcon />
                    </div>
                    <h1 className="text-xl font-black text-white tracking-tight">Ali's SaaS Debt Network</h1>
                    <p className="text-slate-400 text-xs">Access your real-time secure shop ledger.</p>
                  </div>

                  <form onSubmit={handleShopkeeperLogin} className="space-y-3.5">
                    <div>
                      <label className="text-[10px] font-black text-slate-500 tracking-widest uppercase block mb-1.5 ml-1">Access Passcode</label>
                      <input 
                        type="text" 
                        required 
                        placeholder="e.g. demo77" 
                        value={shopkeeperCodeInput} 
                        onChange={e => setShopkeeperCodeInput(e.target.value)} 
                        className="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white font-bold text-center text-sm uppercase tracking-widest focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500" 
                      />
                    </div>
                    <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-xs transition-colors shadow-lg shadow-indigo-600/20">
                      Open My Store Ledger
                    </button>
                  </form>

                  <div className="pt-4 border-t border-slate-800/60 flex items-center gap-2">
                    <input 
                      type="password" 
                      placeholder="Admin Pin" 
                      value={adminPasswordInput} 
                      onChange={e => setAdminPasswordInput(e.target.value)} 
                      className="flex-1 px-3 py-2 bg-slate-950 border border-slate-850 rounded-lg text-white text-xs focus:outline-none focus:border-indigo-500 font-medium" 
                    />
                    <button onClick={handleAdminLogin} className="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold rounded-lg shrink-0 transition-colors">
                      Admin Gateway
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          // VIEWPORT: SUPER-ADMIN CONFIGURATION MATRIX
          if (currentView === 'admin') {
            return (
              <div className="min-h-screen bg-slate-50 text-slate-800 flex flex-col">
                <header className="bg-slate-950 text-white px-6 py-4 flex items-center justify-between border-b border-slate-800 shadow-md">
                  <div className="flex items-center gap-2">
                    <div className="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-ping"></div>
                    <span className="font-extrabold text-xs tracking-wider text-slate-200 uppercase">Ali's Master Admin Matrix</span>
                  </div>
                  <button onClick={handleLogout} className="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-xs font-bold rounded-lg text-slate-200 transition-colors">
                    Exit Admin Matrix
                  </button>
                </header>

                <main className="p-4 md:p-6 max-w-4xl w-full mx-auto space-y-6 flex-1">
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                      <span className="text-[10px] text-slate-400 font-black uppercase tracking-wider">Store Terminals</span>
                      <p className="text-2xl font-black mt-1 text-slate-900">{filteredShops.length} Registered</p>
                    </div>
                    <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                      <span className="text-[10px] text-slate-400 font-black uppercase tracking-wider">Projected SaaS Revenue</span>
                      <p className="text-2xl font-black text-emerald-600 mt-1">${filteredShops.reduce((a, s) => a + (s.monthlyRent || 0), 0).toFixed(2)} /mo</p>
                    </div>
                    <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                      <span className="text-[10px] text-slate-400 font-black uppercase tracking-wider">Suspended Terminal Nodes</span>

                          <input type="date" required value={reduceDate} onChange={e => setReduceDate(e.target.value)} className="w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:border-indigo-500 font-medium text-slate-900" />
                        </div>
                        <div className="flex justify-end gap-2 pt-2 text-[11px] font-bold">
                          <button type="button" onClick={() => setIsReduceModalOpen(false)} className="px-3.5 py-2 border rounded-xl text-slate-500 transition-colors hover:bg-slate-50">Cancel</button>
                          <button type="submit" className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-colors">Apply Payment</button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* MODAL: CUSTOM EMBEDDED CONFIRMATION OVERLAY */}
                {confirmModal.isOpen && (
                  <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-xs">
                    <div className="bg-white rounded-2xl w-full max-w-xs p-5 space-y-4 shadow-2xl border border-slate-100 animate-scale-up">
                      <div className="space-y-2">
                        <h4 className="font-extrabold text-slate-900 text-sm tracking-tight">{confirmModal.title}</h4>
                        <p className="text-slate-500 text-xs leading-relaxed">{confirmModal.message}</p>
                      </div>
                      <div className="flex justify-end gap-2 text-[11px] font-bold pt-1">
                        <button 
                          type="button" 
                          onClick={() => setConfirmModal(prev => ({ ...prev, isOpen: false }))} 
                          className="px-3.5 py-2 border rounded-xl text-slate-500 hover:bg-slate-50 transition-colors"
                        >
                          Cancel
                        </button>
                        <button 
                          type="button" 
                          onClick={confirmModal.onConfirm} 
                          className="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-xl transition-colors shadow-sm"
                        >
                          Confirm Action
                        </button>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            );
          }

          return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
